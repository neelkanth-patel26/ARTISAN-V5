name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Capacitor Setup & Build
        run: |
          # Create dummy web directory to satisfy Capacitor
          mkdir -p out
          echo "<html><body>Artisan V5 Mobile Shell</body></html>" > out/index.html

          # Ensure android platform is added
          npx cap add android
          
          # Create necessary directories
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res/values

          # --- SURGICAL IDENTITY FIX ---
          # 1. Force App Name in strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Gaming Network Studio Media Group</string><string name="title_activity_main">Gaming Network Studio Media Group</string><string name="package_name">com.artisan.v5</string><string name="custom_url_scheme">com.artisan.v5</string></resources>' > android/app/src/main/res/values/strings.xml
          
          # 2. Delete Adaptive Icons (XMLs) that override our PNGs
          find android/app/src/main/res -name "ic_launcher_foreground.xml" -delete
          find android/app/src/main/res -name "ic_launcher_background.xml" -delete
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          
          # 3. Inject icons from public/ to android resources
          for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$size
            cp public/icon-512.png android/app/src/main/res/mipmap-$size/ic_launcher.png
            cp public/icon-512.png android/app/src/main/res/mipmap-$size/ic_launcher_round.png
          done

          # Sync capacitor
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: artisan-v5-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
