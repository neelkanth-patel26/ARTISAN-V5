name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Capacitor Setup & Build
        run: |
          # Ensure android platform is added
          npx cap add android
          
          # Create assets directory if it doesn't exist
          mkdir -p android/app/src/main/assets
          
          # Inject icons from public/ to android resources
          # Note: We use the 512px icon for all for simplicity in CI, 
          # Android Studio/Gradle will handle scaling if needed or we just use one high-res one.
          for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$size
            cp public/icon-512.png android/app/src/main/res/mipmap-$size/ic_launcher.png
            cp public/icon-512.png android/app/src/main/res/mipmap-$size/ic_launcher_round.png
          done

          # Sync capacitor
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: artisan-v5-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
