<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator - Artisan</title>
  <style>
    body { font-family: Arial; padding: 40px; background: #000; color: #fff; }
    button { background: #d97706; color: #fff; border: none; padding: 15px 30px; font-size: 16px; cursor: pointer; border-radius: 8px; margin: 10px 5px; }
    button:hover { background: #b45309; }
    .preview { display: flex; gap: 20px; flex-wrap: wrap; margin: 30px 0; }
    .icon-box { text-align: center; padding: 20px; background: #1a1a1a; border-radius: 8px; }
    canvas { border: 1px solid #333; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Artisan Icon Generator</h1>
  <p>Generate all required icons for browser, mobile, and PWA</p>
  
  <button onclick="generateAll()">Generate All Icons</button>
  <button onclick="downloadAll()">Download All</button>
  
  <div class="preview" id="preview"></div>

  <script>
    const icons = [
      { name: 'favicon.ico', size: 32, type: 'ico' },
      { name: 'icon-192.png', size: 192, type: 'png' },
      { name: 'icon-256.png', size: 256, type: 'png' },
      { name: 'icon-384.png', size: 384, type: 'png' },
      { name: 'icon-512.png', size: 512, type: 'png' },
      { name: 'apple-touch-icon.png', size: 180, type: 'png' },
      { name: 'icon-maskable-192.png', size: 192, type: 'maskable' },
      { name: 'icon-maskable-512.png', size: 512, type: 'maskable' }
    ];

    const canvases = {};

    function drawIcon(canvas, size, maskable = false) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;
      
      const padding = maskable ? size * 0.15 : 0;
      const contentSize = size - (padding * 2);
      const scale = contentSize / 100;
      const offsetX = padding;
      const offsetY = padding;
      const radius = 20 * scale;
      
      // Rounded background
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.roundRect(offsetX, offsetY, contentSize, contentSize, radius);
      ctx.fill();
      
      // Gradient for A
      const gradient = ctx.createLinearGradient(offsetX, offsetY, offsetX + contentSize, offsetY + contentSize);
      gradient.addColorStop(0, '#d97706');
      gradient.addColorStop(1, '#f59e0b');
      
      // Letter A
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(offsetX + 50 * scale, offsetY + 25 * scale);
      ctx.lineTo(offsetX + 70 * scale, offsetY + 75 * scale);
      ctx.lineTo(offsetX + 60 * scale, offsetY + 75 * scale);
      ctx.lineTo(offsetX + 56 * scale, offsetY + 62 * scale);
      ctx.lineTo(offsetX + 44 * scale, offsetY + 62 * scale);
      ctx.lineTo(offsetX + 40 * scale, offsetY + 75 * scale);
      ctx.lineTo(offsetX + 30 * scale, offsetY + 75 * scale);
      ctx.closePath();
      ctx.fill();
      
      // A crossbar hole (triangle)
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.moveTo(offsetX + 50 * scale, offsetY + 40 * scale);
      ctx.lineTo(offsetX + 54 * scale, offsetY + 54 * scale);
      ctx.lineTo(offsetX + 46 * scale, offsetY + 54 * scale);
      ctx.closePath();
      ctx.fill();
      
      // Border for maskable
      if (maskable) {
        ctx.strokeStyle = '#d97706';
        ctx.lineWidth = size * 0.02;
        ctx.beginPath();
        ctx.roundRect(padding, padding, contentSize, contentSize, radius);
        ctx.stroke();
      }
    }

    function generateAll() {
      const preview = document.getElementById('preview');
      preview.innerHTML = '';
      
      icons.forEach(icon => {
        const box = document.createElement('div');
        box.className = 'icon-box';
        
        const canvas = document.createElement('canvas');
        const isMaskable = icon.type === 'maskable';
        drawIcon(canvas, icon.size, isMaskable);
        
        canvases[icon.name] = canvas;
        
        const label = document.createElement('div');
        label.textContent = `${icon.name} (${icon.size}x${icon.size})`;
        label.style.marginTop = '10px';
        label.style.fontSize = '12px';
        label.style.color = '#d97706';
        
        box.appendChild(canvas);
        box.appendChild(label);
        preview.appendChild(box);
      });
    }

    function downloadAll() {
      icons.forEach(icon => {
        const canvas = canvases[icon.name];
        if (!canvas) return;
        
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = icon.name;
          a.click();
          URL.revokeObjectURL(url);
        }, 'image/png');
      });
    }

    // Auto-generate on load
    window.onload = generateAll;
  </script>
</body>
</html>
