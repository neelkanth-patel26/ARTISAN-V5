<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate PWA Icons</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 10px 0; }
        button { padding: 10px 20px; margin: 5px; background: #d97706; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #b45309; }
    </style>
</head>
<body>
    <h1>Generate Simple "A" PWA Icons</h1>
    <p>This tool generates PNG icons with a simple "A" letter for the PWA.</p>

    <div>
        <button onclick="generateIcon(192)">Generate 192x192 PNG</button>
        <button onclick="generateIcon(512)">Generate 512x512 PNG</button>
    </div>

    <div id="canvases"></div>

    <script>
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            canvas.style.display = 'block';

            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = '#d97706';
            ctx.fillRect(0, 0, size, size);

            // Rounded corners for larger icons
            if (size >= 192) {
                ctx.globalCompositeOperation = 'destination-in';
                ctx.beginPath();
                ctx.arc(size/2, size/2, size/2, 0, 2 * Math.PI);
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
            }

            // Letter A
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.55}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('A', size/2, size/2 + size * 0.05);

            // Add to page
            const container = document.getElementById('canvases');
            const div = document.createElement('div');
            div.innerHTML = `<h3>${size}x${size} Icon</h3>`;
            div.appendChild(canvas);

            // Download button
            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = `Download ${size}x${size}`;
            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.download = `icon-${size}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };
            div.appendChild(downloadBtn);

            container.appendChild(div);
        }

        // Auto-generate both sizes
        window.onload = () => {
            generateIcon(192);
            generateIcon(512);
        };
    </script>
</body>
</html>
